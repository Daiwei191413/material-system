name = "lcsc-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

# KV 命名空间：缓存立创元器件数据 7 天 + 配额计数
[[kv_namespaces]]
binding = "LCSC_CACHE"
id = "e859ec2df32e4b289a47ca246ffa9701"

# 立创开放平台密钥通过 wrangler secret put 注入：
#   JLC_ACCESS_KEY / JLC_SECRET_KEY / JLC_APP_ID

[observability]
enabled = true
