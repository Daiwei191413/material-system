name = "lcsc-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

# 可选：绑定 KV 命名空间作为缓存（弹性免费 100K reads/day, 1K writes/day）
# 部署前需要先创建：wrangler kv:namespace create LCSC_CACHE
# 然后把返回的 id 填到下面，取消注释
# [[kv_namespaces]]
# binding = "LCSC_CACHE"
# id = "<your_kv_namespace_id>"

[observability]
enabled = true
